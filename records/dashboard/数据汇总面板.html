<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Binance 小时线总览</title>
  <style>
    :root {
      --bg:#07111f;
      --bg-deep:#0d1726;
      --panel:rgba(11,20,33,.84);
      --ink:#ecf4ff;
      --muted:#8fa5bf;
      --line:rgba(110,168,255,.16);
      --accent:#57c7ff;
      --accent-soft:#8be0ff;
      --shadow:0 28px 70px rgba(0,0,0,.42);
      --bg-layer-a:radial-gradient(circle at 10% 10%, rgba(87,199,255,.18), transparent 24%);
      --bg-layer-b:radial-gradient(circle at 88% 16%, rgba(124,92,255,.14), transparent 22%);
      --bg-layer-c:linear-gradient(145deg, #040b16 0%, var(--bg) 44%, var(--bg-deep) 100%);
      --grid-line:rgba(255,255,255,.05);
      --hero-bg:linear-gradient(145deg, rgba(10,18,31,.96), rgba(12,23,39,.92));
      --input-bg:rgba(255,255,255,.06);
      --chip-bg:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      --note-bg:rgba(255,255,255,.04);
      --table-head-bg:linear-gradient(180deg, rgba(87,199,255,.16) 0%, rgba(87,199,255,.1) 100%);
      --row-odd:rgba(255,255,255,.02);
      --row-even:rgba(255,255,255,.045);
      --row-hover:linear-gradient(90deg, rgba(87,199,255,.11), rgba(124,92,255,.08));
      --scroll-thumb:rgba(87,199,255,.55);
      --scroll-track:rgba(255,255,255,.08);
      --button-bg:linear-gradient(180deg, #57c7ff, #278fd4);
      --button-ink:#04111e;
    }
    body[data-theme="light"] {
      --bg:#f5efe3;
      --bg-deep:#efe3d0;
      --panel:rgba(255,251,246,.94);
      --ink:#1e1812;
      --muted:#6f6559;
      --line:rgba(111,88,56,.18);
      --accent:#9a5f24;
      --accent-soft:#c98949;
      --shadow:0 22px 48px rgba(101,72,37,.11);
      --bg-layer-a:radial-gradient(circle at 12% 10%, rgba(201,137,73,.22), transparent 26%);
      --bg-layer-b:radial-gradient(circle at 86% 14%, rgba(255,225,185,.42), transparent 22%);
      --bg-layer-c:linear-gradient(145deg, #fbf6ee 0%, var(--bg) 42%, var(--bg-deep) 100%);
      --grid-line:rgba(111,88,56,.06);
      --hero-bg:linear-gradient(145deg, rgba(255,252,247,.98), rgba(248,238,223,.96));
      --input-bg:rgba(255,255,255,.88);
      --chip-bg:linear-gradient(180deg, rgba(255,250,245,.96), rgba(245,235,219,.92));
      --note-bg:rgba(255,250,244,.82);
      --table-head-bg:linear-gradient(180deg, rgba(201,137,73,.22) 0%, rgba(201,137,73,.12) 100%);
      --row-odd:rgba(255,252,247,.74);
      --row-even:rgba(248,241,231,.92);
      --row-hover:linear-gradient(90deg, rgba(201,137,73,.16), rgba(255,229,196,.22));
      --scroll-thumb:rgba(154,95,36,.5);
      --scroll-track:rgba(111,88,56,.08);
      --button-bg:linear-gradient(180deg, #aa6a2a, #8d541b);
      --button-ink:#fffaf3;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:"Iowan Old Style","Palatino Linotype","Noto Serif SC","Source Han Serif SC","PingFang SC",serif;
      background:var(--bg-layer-a), var(--bg-layer-b), var(--bg-layer-c);
      color:var(--ink);
      min-height:100vh;
    }
    body::before {
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image:radial-gradient(circle at center, black 40%, transparent 90%);
      opacity:.22;
    }
    main { max-width:1380px; margin:0 auto; padding:34px 20px 44px; position:relative; }
    .hero {
      margin-bottom:22px;
      padding:28px;
      background:var(--hero-bg);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }
    .hero-top {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
    }
    .theme-switch {
      min-width:132px;
      padding:11px 14px;
      border:1px solid var(--line);
      border-radius:999px;
      background:var(--input-bg);
      color:var(--ink);
    }
    h1 { margin:0; font-size:38px; letter-spacing:.01em; }
    .sub { margin-top:10px; color:var(--muted); max-width:900px; line-height:1.6; }
    .meta { display:flex; gap:12px; flex-wrap:wrap; margin:18px 0 0; }
    .chip {
      background:var(--chip-bg);
      border:1px solid var(--line);
      border-radius:999px;
      padding:9px 14px;
      color:var(--muted);
    }
    .toolbar { display:flex; gap:14px; flex-wrap:wrap; margin:22px 0 0; align-items:center; }
    .toolbar input {
      flex:1 1 220px;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--input-bg);
      color:var(--ink);
    }
    .toolbar-group { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .toolbar button {
      padding:12px 16px;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(255,255,255,.06);
      color:var(--ink);
      cursor:pointer;
    }
    .toolbar button.primary {
      background:var(--button-bg);
      color:var(--button-ink);
      border-color:transparent;
      box-shadow:0 12px 28px rgba(39,143,212,.26);
    }
    .segmented { display:flex; gap:8px; flex-wrap:wrap; }
    .segmented button {
      min-width:68px;
      border-radius:999px;
      padding:10px 14px;
    }
    .segmented button.active {
      background:var(--button-bg);
      color:var(--button-ink);
      border-color:transparent;
    }
    .table-guides { display:flex; gap:10px; flex-wrap:wrap; margin:0 0 10px; }
    .table-note {
      color:var(--muted);
      font-size:13px;
      letter-spacing:.02em;
      padding:8px 12px;
      border-radius:999px;
      background:var(--note-bg);
      border:1px solid rgba(126,103,74,.16);
    }
    .table-wrap {
      overflow:auto;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      scrollbar-width:thin;
      scrollbar-color:var(--scroll-thumb) var(--scroll-track);
    }
    table { width:100%; border-collapse:separate; border-spacing:0; min-width:1100px; font-size:14px; }
    thead th {
      position:sticky;
      top:0;
      z-index:1;
      background:var(--table-head-bg);
      color:var(--ink);
      font-size:12px;
      letter-spacing:.04em;
      text-transform:uppercase;
      cursor:pointer;
      user-select:none;
    }
    thead th.sort-asc::after { content:" ↑"; color:var(--accent); }
    thead th.sort-desc::after { content:" ↓"; color:var(--accent); }
    th, td { padding:11px 9px; border-bottom:1px solid rgba(126,103,74,.14); text-align:right; white-space:nowrap; }
    th:first-child, td:first-child { text-align:left; position:sticky; left:0; background:inherit; min-width:180px; }
    tbody td:first-child { font-weight:700; color:var(--ink); }
    tbody tr:nth-child(odd) { background:var(--row-odd); }
    tbody tr:nth-child(even) { background:var(--row-even); }
    tbody tr:hover { background:var(--row-hover); }
    .muted { color:var(--muted); }
    @media (max-width: 900px) {
      main { padding:22px 14px 34px; }
      .hero { padding:22px 18px 20px; border-radius:22px; }
      h1 { font-size:30px; }
      table { min-width:980px; font-size:13px; }
      th, td { padding:10px 8px; }
      th:first-child, td:first-child { min-width:140px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>加密货币数据看板</h1>
          <div class="sub">数据来源于 Binance。保留 xlsx 输出，同时基于最新小时线数据生成在线筛选页。最新价格时间：2026-03-15 21:00:00</div>
        </div>
        <select id="themeToggle" class="theme-switch" aria-label="主题切换">
          <option value="dark">暗色主题</option>
          <option value="light">亮色主题</option>
        </select>
      </div>
      <div class="meta">
        <div class="chip">品种数：555</div>
        <div class="chip">最新价格时间：2026-03-15 21:00:00</div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="搜索品种，例如 BTC / XAU">
        <div class="toolbar-group">
          <span class="muted">价格区间</span>
          <div id="priceWindowButtons" class="segmented">
            <button type="button" data-window="1">1天</button>
            <button type="button" data-window="3">3天</button>
            <button type="button" data-window="5">5天</button>
            <button type="button" data-window="7">7天</button>
          </div>
        </div>
        <div class="toolbar-group">
          <span class="muted">成交量区间</span>
          <div id="volumeWindowButtons" class="segmented">
            <button type="button" data-window="1">1小时</button>
            <button type="button" data-window="3">3小时</button>
            <button type="button" data-window="6">6小时</button>
            <button type="button" data-window="12">12小时</button>
            <button type="button" data-window="24">24小时</button>
          </div>
        </div>
        <button id="resetFilters" class="primary" type="button">重置筛选</button>
      </div>
    </section>
    <div class="table-guides">
      <div class="table-note">排序提示：点击任意表头可按该列升序或降序排序。</div>
      <div class="table-note">同一时间只显示当前选中区间的一组最高价、最低价、相对高点跌幅和相对低点涨幅。</div>
      <div class="table-note">成交量使用最近 N 小时的 K 线成交额汇总，单位为 USDT。</div>
    </div>
    <div class="table-wrap">
      <table id="overview">
        <thead>
          <tr>
            <th data-sort-key="symbol_display" data-sort-type="text">品种</th>
            <th data-sort-key="current_price_value" data-sort-type="number">最近一刻价格</th>
            <th data-sort-key="day_high_value" data-sort-type="number">当天最高价</th>
            <th data-sort-key="day_low_value" data-sort-type="number">当天最低价</th>
            <th id="windowHighHeader" data-sort-key="selected_window_high" data-sort-type="number">近3天最高价</th>
            <th id="windowLowHeader" data-sort-key="selected_window_low" data-sort-type="number">近3天最低价</th>
            <th id="windowDownHeader" data-sort-key="selected_window_down" data-sort-type="percent">距近3天最高跌幅</th>
            <th id="windowUpHeader" data-sort-key="selected_window_up" data-sort-type="percent">距近3天最低涨幅</th>
            <th id="volumeHeader" data-sort-key="selected_volume" data-sort-type="number">近24小时成交量</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

    const searchInput = document.getElementById("search");

    function selectedPriceStats(row) {
      return row.price_windows[selectedPriceWindow];
    }

    function selectedVolumeStats(row) {
      return row.volume_windows[selectedVolumeWindow];
    }

    function withSelectedMetrics(row) {
      const priceStats = selectedPriceStats(row);
      const volumeStats = selectedVolumeStats(row);
      return {
        ...row,
        selected_window_high: priceStats.high,
        selected_window_high_display: priceStats.high_display,
        selected_window_low: priceStats.low,
        selected_window_low_display: priceStats.low_display,
        selected_window_down: priceStats.down_from_high,
        selected_window_down_display: priceStats.down_from_high_display,
        selected_window_up: priceStats.up_from_low,
        selected_window_up_display: priceStats.up_from_low_display,
        selected_volume: volumeStats.value,
        selected_volume_display: volumeStats.display
      };
    }

    function render(data) {
      tbody.innerHTML = data.map((row) => `
        <tr>
          <td>${row.symbol_display}</td>
          <td>${row.current_price}</td>
          <td>${row.day_high}</td>
          <td>${row.day_low}</td>
          <td>${row.selected_window_high_display}</td>
          <td>${row.selected_window_low_display}</td>
          <td>${row.selected_window_down_display}</td>
          <td>${row.selected_window_up_display}</td>
          <td>${row.selected_volume_display}</td>
        </tr>`).join("");
    }

    function parseValue(value, type) {
      if (type === "number" || type === "percent") {
        if (value === null || value === undefined || value === "-") return Number.NEGATIVE_INFINITY;
        const parsed = Number.parseFloat(String(value).replace("%", ""));
        return Number.isNaN(parsed) ? Number.NEGATIVE_INFINITY : parsed;
      }
      return String(value ?? "");
    }

    function sortRows(data) {
      const direction = sortState.direction === "asc" ? 1 : -1;
      const decorated = data.map(withSelectedMetrics);
      return [...decorated].sort((a, b) => {
        const aValue = parseValue(a[sortState.key], sortState.type);
        const bValue = parseValue(b[sortState.key], sortState.type);
        if (typeof aValue === "string" || typeof bValue === "string") {
          return String(aValue).localeCompare(String(bValue), "zh-CN") * direction;
        }
        return (aValue - bValue) * direction;
      });

    }

    function applyFilters() {
      const keyword = searchInput.value.trim().toUpperCase();

      render(sortRows(filtered));
    }

    searchInput.addEventListener("input", applyFilters);

        const type = header.dataset.sortType || "text";
        if (sortState.key === key) {
          sortState.direction = sortState.direction === "asc" ? "desc" : "asc";
        } else {
          sortState = { key, direction: "asc", type };
        }
        updateSortIndicators();
        applyFilters();
      });
    });
    document.body.dataset.theme = "dark";
    themeToggle.value = "dark";
    updateWindowLabels();
    updateSortIndicators();
    applyFilters();
  </script>
</body>
</html>
